  warnings: Optional[List[str]] to JobRecord and JobStatus, serialized via
  getattr in the job_status route, threaded warnings_callback through
  process_files → translate_pdf → _translate_pdf_to_pdf → _dispatch_render,
  wired the callback from create_job, added module-level constants, updated
  the existing _make_job helper, created 9 new tests, and regenerated openapi.yml.

