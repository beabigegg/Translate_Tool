bug-fix:
  schema-version: 0.1.0

  symptom: >
    Two rendering defects in fitz_renderer.py:
    (a) Overlay mode: table grid lines (vector strokes) are erased after
    apply_redactions() is called — white mask rectangles erase both text and
    underlying vector line art, causing table borders to disappear from output PDFs.
    (b) Side-by-side mode: source-language text remains visible on the right panel
    under/around the translated overlay — no white-mask pass exists over the
    right-panel copy of the source page before translated text is placed.

  expected_behavior: >
    (a) Overlay output PDFs preserve table grid lines (vector strokes) while fully
    removing source text content (AC-1, AC-3).
    (b) Side-by-side right panel contains no visible source-language text; all
    source text regions are masked before the translated overlay is drawn (AC-2).

  actual_behavior: >
    (a) page.get_drawings() returns empty after overlay redaction; vector strokes
    erased by default apply_redactions() behavior.
    (b) page.get_text() on the right-half clip returns source text strings alongside
    translated text — 'Hello World' visible alongside '翻譯1/2/3'.

  observed_surface: "PDFGenerator._generate_overlay and PDFGenerator._generate_side_by_side"

  reproduction:
    status: test-reproduced
    command: "/home/egg/miniforge3/envs/translate-tool/bin/pytest tests/test_table_border_protection.py -x -q --tb=short --junitxml='/home/egg/Projects/Translate_Tool/specs/changes/p2-table-border-protection/test-runs/20260619-095813/junit.xml' -ra"
    failing_before_fix: true
    summary: "specs/changes/p2-table-border-protection/test-runs/20260619-095813/summary.json"

  hypotheses:
    - id: H1
      candidate: "app/backend/renderers/fitz_renderer.py::PDFGenerator._generate_overlay:page.apply_redactions()"
      reason: "PyMuPDF apply_redactions() default behavior removes all graphics (including vector strokes) under redaction rects, not just text"
      result: confirmed
    - id: H2
      candidate: "app/backend/renderers/fitz_renderer.py::PDFGenerator._generate_side_by_side lines 623-642"
      reason: "No white-mask or redaction pass exists between the right-panel show_pdf_page copy and the translated overlay placement"
      result: confirmed
    - id: H3
      candidate: "app/backend/renderers/fitz_renderer.py::PDFGenerator._create_page_overlay draw_background"
      reason: "ReportLab overlay draw_background might be intended to mask source text on right panel"
      result: rejected

  root_cause:
    pointer: "app/backend/renderers/fitz_renderer.py:356 and app/backend/renderers/fitz_renderer.py:626-649"
    summary: >
      Bug (a): line 353 (pre-fix) called page.apply_redactions() with no arguments.
      PyMuPDF default removes all content under the redaction rect including vector
      strokes (table border lines). Fix: page.apply_redactions(graphics=0) preserves
      vector graphics while still removing text.
      Bug (b): _generate_side_by_side had no masking step between copying the source
      page to the right half (lines 617-621) and placing the translated overlay (lines
      654-662). Source text from show_pdf_page was embedded in the page content stream
      and remained extractable by get_text(). Fix: add draw_rect + add_redact_annot +
      apply_redactions(graphics=0) loop over element bboxes (offset by src_rect.width)
      before the overlay placement.

  fix:
    files_changed:
      - app/backend/renderers/fitz_renderer.py
      - tests/test_table_border_protection.py
    summary: >
      Bug (a): changed page.apply_redactions() to page.apply_redactions(graphics=0)
      at fitz_renderer.py:356. No other overlay code changed.
      Bug (b): inserted a masking loop at fitz_renderer.py:626-649 inside
      _generate_side_by_side that iterates elements, draws white fill rects, adds
      redact annotations, and calls apply_redactions(graphics=0) on the right-panel
      copy before the translated overlay is placed. No new top-level imports added
      (AC-5 confirmed by TestConfinementNoNewImports).

  regression:
    status: passed
    command: "/home/egg/miniforge3/envs/translate-tool/bin/pytest tests/test_table_border_protection.py tests/test_golden_regression.py tests/test_pdf_generator.py -x -q --tb=short"
    summary: "specs/changes/p2-table-border-protection/test-runs/20260619-100042/summary.json"

  residual_risk: >
    TestOverlayBorderPreservation is skipped because tests/fixtures/test.pdf contains
    no vector drawings — the get_drawings() assertion for Bug (a) is vacuously skipped.
    The apply_redactions(graphics=0) call is confirmed in source and the geometry unit
    tests pass; a dedicated PDF fixture with table lines would make this test
    non-vacuous. Tracked as follow-up.

