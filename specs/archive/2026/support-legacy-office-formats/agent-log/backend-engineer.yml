addendum-main-claude: >
  Root-caused and fixed rather than excluded: GET /providers/{provider_id}/live-models
  existed in routes.py but was never documented in api-contract.md. Added the endpoint
  row (with /api prefix, matching the literal frontend fetch() call and the sole existing
  /api/metrics precedent — bare-path rows elsewhere in the table are not matched by the
  conformance scanner's fetch()-only heuristic) plus an Endpoint Notes entry, re-exported
  openapi.yml, and re-ran the contract test-evidence phase. contract phase now shows
  status: passed, final-status: passed in test-evidence.yml. No qa-report.md exclusion
  needed.
