  warnings_callback disclosure verbatim per IP-6's exact snippet, placed right
  before `processed_count += 1`. All source line-number assumptions in the plan
  matched current source exactly (no drift). Wrote tests/test_libreoffice_helpers.py
  (new, 7 tests) and extended tests/test_orchestrator_phase0.py (+6 tests),
  tests/contract/test_legacy_conversion_disclosure.py (new, 2 tests — added one
  extra test beyond the required node ID to guard the documented COM-vs-LibreOffice
  disclosure-string edge case from Known Risks), and tests/test_quality_evaluation.py
  (+1 test) per the exact node IDs in test-plan.md / implementation-plan.md.
  All new/extended tests confirmed passing after implementation.
