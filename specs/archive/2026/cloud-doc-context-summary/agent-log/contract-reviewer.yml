  - FIX 2 (recommended, applied): BR-78 row now cross-references that on the cloud client its system_context merges into the SAME leading system-role message as client.system_prompt (system_prompt content first, see BR-109), explicitly noting the never-in-user-payload guarantee is not weakened.
  - Verified after fixes: `cdd-kit validate --contracts` green; BR-78 guard tests (test_context_window_segments.py + test_context_prefix_bleed.py, 17 tests) green.
