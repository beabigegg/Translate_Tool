notes: |
  Part 1 (initial pass): verified seam facts from implementation-plan.md against live
  source before editing: confirmed _detect_document_context (orchestrator.py:321-338
  pre-edit) called Ollama-only client._build_no_system_payload/._call_ollama, and that
  OpenAICompatibleClient implements neither -- resolved via the planned shared
  complete() method on both concrete clients, NOT translate_once (which
  translate-wraps the prompt and would corrupt the summary). base_llm_client.py
  Protocol was NOT touched; tests/test_llm_client_protocol.py
  ::test_protocol_defines_five_methods re-run and stays green (5 methods).
  Grepped tests/ for _detect_document_context, _call_ollama, _build_no_system_payload,
  _post_completion: found no other test doubles reproducing this seam beyond the
  two named in the plan (IP-6/IP-7).
  tests/test_orchestrator_phase0.py verified green as-is (IP-9, verify-only).

  Part 2 (coordinator-directed scope expansion, same change-id, user-approved):
  the coordinator's live PANJIT capability probe confirmed the endpoint fully
  honors system-role messages; the limitation (client.system_prompt writes
  silently discarded on the cloud path) was self-imposed. Fix:
  - translate_once() now computes
    `parts = [p for p in ((self.system_prompt or "").strip(), (system_context or "").strip()) if p]`
    then `merged_system_context = "\n\n".join(parts) or None`, and forwards
    that as the SOLE system_context to _post_completion -- preamble first,
    BR-78 per-segment context second, both in ONE system message, never in
    the user payload. `_build_messages` itself stays pure (does not read
    self.system_prompt) so complete() -- which never passes system_context --
    stays clean by construction (verified directly by a new test).
  - Fixed the AC-2 tautology the coordinator flagged: the old test asserted on
    `client.system_prompt` (the attribute) which passed even when the value
    never reached the wire. Rewrote it to capture the actual outgoing
    requests.Session.post JSON body via a translate_docx stub that calls the
    real `client.translate_once(...)`, then asserts the request's system
    message contains "Document context: <summary>" and the user message does
    not (anti-bleed).
  - Added 3 new tests in tests/test_openai_compatible_client.py
    (TestSystemPromptDelivery) covering merge-ordering, system_prompt-alone
    delivery, and complete()'s no-system-message guarantee.
  - Re-checked (ran, all green, no edits needed) every file the coordinator
    named for message/payload-shape risk: tests/test_context_prefix_bleed.py
    (uses a hand-written _FakeEchoClient implementing the LLMClient Protocol
    directly -- never touches the real OpenAICompatibleClient, so BR-78/step-1
    bleed protection is verified independent of this change and unaffected),
    tests/test_openai_compatible_client.py (extended, not broken -- the two
    pre-existing TestSystemContextChannel tests don't set client.system_prompt
    so they still observe 0/1 system messages exactly as before), Also swept
    test_cloud_total_timeout.py, test_term_extractor.py, test_quality_judge.py,
    test_providers_api.py, test_table_context_translation.py,
    test_term_extractor_resilience.py for messages/system_prompt assertions --
    none found; all pass unmodified.
  - Discovered during Part-1 test-writing (unaffected by Part 2): orchestrator.py's
    per-file `finally:` clause unconditionally resets
    `client.system_prompt = base_system_prompt` after every file (pre-existing,
    out of scope), so AC-6/local-path assertions capture client.system_prompt
    inside the mocked translate_docx call rather than after process_files()
    returns; AC-2 (post scope-expansion) instead captures the wire payload
    directly, sidestepping this entirely.
  Test evidence re-run under `conda run -n translate-tool` per project learning.
  Full-suite smoke deferred to CI (optional per test-plan.md Test Execution
  Ladder; all required phases -- collect, targeted, changed-area, contract --
  passed both before and after the scope expansion).
