summary: "Part 1: added a shared complete(prompt) -> (ok, text) raw-completion seam to both concrete LLM clients, routed _detect_document_context through it, and removed the _cloud_client-is-None guard exclusion so the document-context summary now generates on the active cloud client (BR-109/AC-1..AC-7). Part 2 (coordinator-directed scope expansion): closed the gap where OpenAICompatibleClient.system_prompt was an orchestrator-compatibility stub whose writes were silently discarded -- translate_once() now merges it (scenario style + Document-context preamble) ahead of the per-segment BR-78 system_context into ONE leading system message on every real cloud translate call (ADR-0016), while complete() (the summary seam) still carries no system message. base_llm_client.py Protocol left untouched throughout (still exactly 5 methods)."
