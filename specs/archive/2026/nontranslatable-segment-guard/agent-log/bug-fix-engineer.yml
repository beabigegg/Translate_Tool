bug-fix:
  schema-version: 0.1.0
  symptom: "A trivial/non-translatable body (non-table) segment on the translate_merged_paragraphs -> client.translate_once path is sent to the LLM, which replies with a meta/refusal string, and that reply is written verbatim into the output in place of the segment."
  expected_behavior: "Trivial/non-translatable body segments pass through untranslated (output = source, no LLM call). If the LLM does reply with a meta/refusal string, the pipeline discards it and falls back to the source — the meta string is never written to output."
  actual_behavior: "Body segments had no non-translatable passthrough (unlike table cells, BR-68) and no output-side guard: a trivial/short segment was sent to the LLM, the LLM asked back for the source text, and the ask-back string was stored as the \"translation\"."
  observed_surface: "8D PDF English translation run (task 42265c0b) — an output block showing \"Could you please provide the text you'd like translated?\" in place of a trivial/already-English body segment."
  reproduction:
    status: test-reproduced
    command: "python -m pytest tests/test_nontranslatable_segment_guard.py::TestTrivialPassthrough tests/test_nontranslatable_segment_guard.py::TestRefusalOutputGuard tests/test_nontranslatable_segment_guard.py::TestReproduction8D -q --tb=short -ra"
    failing_before_fix: true
    summary: "specs/changes/nontranslatable-segment-guard/test-runs/20260708-203123/summary.json"
  hypotheses:
    - { id: H1, candidate: "app/backend/utils/translation_helpers.py::translate_merged_paragraphs — missing BR-107 input passthrough (only an empty/whitespace early-continue existed)", reason: "table cells already have a numeric passthrough (BR-68, translation_service.py:887); no equivalent existed for body segments", result: confirmed }
    - { id: H2, candidate: "app/backend/utils/translation_helpers.py::translate_merged_paragraphs — missing BR-108 output guard on the `if ok:` branch", reason: "no code rejected a meta/refusal LLM reply before writing it to results", result: confirmed }
    - { id: H3, candidate: "app/backend/services/translation_service.py tmap mapping (L374-388)", reason: "considered whether the tmap/result-mapping step silently accepted bad replies", result: rejected }
    - { id: H4, candidate: "app/backend/clients/openai_compatible_client.py / ollama_client.py client-side short-token bypass", reason: "translation_helpers.py:182 references an existing client-side bypass; considered whether the fix belonged in the client instead of the helper", result: rejected }
  root_cause:
    pointer: "app/backend/utils/translation_helpers.py:173-182,196-208"
    summary: "translate_merged_paragraphs only skipped truly empty/whitespace text before calling client.translate_once (no BR-107 trivial-content passthrough), and never inspected the LLM reply for a meta/refusal response before writing it to results (no BR-108 output guard)."
  fix:
    files_changed:
      - app/backend/utils/text_utils.py
      - app/backend/utils/translation_helpers.py
      - tests/test_nontranslatable_segment_guard.py
    summary: "Added a new pure helper is_meta_refusal(reply, source) (+ META_REFUSAL_MAX_CHARS=200 length gate, small self-referential allowlist) in text_utils.py. In translate_merged_paragraphs: replaced the empty/whitespace early-continue with a should_translate() input guard (BR-107) that sets output=source with no LLM call for trivial content; added an is_meta_refusal() output guard (BR-108) inside the ok branch that discards a meta/refusal reply and falls back to the source instead of writing it to results."
  regression:
    status: passed
    command: "python -m pytest tests/test_nontranslatable_segment_guard.py::TestTrivialPassthrough tests/test_nontranslatable_segment_guard.py::TestRefusalOutputGuard tests/test_nontranslatable_segment_guard.py::TestReproduction8D -q --tb=short -ra"
    summary: "specs/changes/nontranslatable-segment-guard/test-runs/20260708-203144/summary.json"
  residual_risk: none
