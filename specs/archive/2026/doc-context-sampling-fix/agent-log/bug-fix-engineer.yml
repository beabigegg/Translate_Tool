bug-fix:
  schema-version: 0.1.0
  symptom: "BR-109's one-sentence document-context summary never fires for legacy .xls, table-only .docx, or table/graphic-frame .pptx documents, and a silent skip/failure was indistinguishable from a successful run in translator.log (the actual production log file, not just any Python logger)."
  expected_behavior: "_sample_file_text returns real, representative text for legacy .xls (via the existing LibreOffice conversion path), table-only .docx (doc.tables cell text), and table/graphic-frame .pptx (table cell text). Every sampling/detection outcome — success, a failed provider call, an empty provider summary, an exception, or an empty-sample skip — is visible in translator.log via the job's log(...) callback, never silently dropped, and every regression test that claims to prove this asserts against that real delivery channel."
  actual_behavior: "_sample_file_text's .docx branch read only doc.paragraphs (never doc.tables); its .pptx branch read only has_text_frame shapes (never table/graphic-frame shapes); its .xls branch called openpyxl.load_workbook directly on a legacy binary .xls, which openpyxl cannot open, always raising and degrading to an empty string with no LibreOffice conversion attempted. A first observability pass routed all new INFO lines through logging.getLogger(__name__) only — a logger with NO production handler (translator.log's RotatingFileHandler is attached to the differently-named \"TranslateTool\" logger) — so those lines were silently dropped at runtime despite passing caplog-based unit tests that attached their own handler directly to the module logger (a wrong-boundary assertion). _detect_document_context's ok=False (failed call) and ok=True-with-empty-result (empty summary) branches also logged nothing at all, a second silent failure mode. Even after fixing both of those, two of the AC-1/AC-8 integration tests still asserted against the same dead module-logger channel, so they would not have caught a regression that dropped the log(...) delivery entirely."
  observed_surface: "translator.log (backend job log file) for .xls, table-only .docx, and table/graphic-frame .pptx uploads, and for any document-context detection call that fails or returns an empty summary."
  reproduction:
    status: test-reproduced
    command: "python -m pytest tests/test_orchestrator_context_detection.py::test_sample_file_text_reads_legacy_xls_via_conversion tests/test_orchestrator_context_detection.py::test_process_files_context_detected_for_legacy_xls tests/test_orchestrator_context_detection.py::test_sample_file_text_docx_table_only_includes_cell_text tests/test_orchestrator_context_detection.py::test_sample_file_text_pptx_table_includes_cell_text tests/test_orchestrator_context_detection.py::test_detect_document_context_logs_info_reason_on_exception tests/test_orchestrator_context_detection.py::test_process_files_logs_info_reason_when_sample_empty tests/test_orchestrator_context_detection.py::test_detect_document_context_logs_info_on_success tests/test_orchestrator_context_detection.py::test_sampling_exception_degrades_to_no_preamble_job_completes tests/test_orchestrator_context_detection.py::test_xls_sampling_does_not_double_convert_via_libreoffice tests/test_orchestrator_context_detection.py::test_legacy_xls_and_table_only_docx_both_emit_context_detected -q --maxfail=1 --tb=short -ra"
