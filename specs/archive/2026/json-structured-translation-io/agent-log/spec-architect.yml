summary: >-
  Tier 1 second sign-off. All five design decisions landed faithfully; Resolution A
  is an improvement over the original design. Named one residual risk: the BR-108
  substring meta-refusal pattern remained false-positive-prone on documents about
  translation. Main Claude fixed that residual before merge.
