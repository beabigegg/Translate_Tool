agent: monkey-test-engineer
change-id: truncation-length-guard
status: complete
summary: >
  Probed the FALSE-POSITIVE boundary of is_suspiciously_short() with 26
  named adversarial scenarios (realistic legit-short, exact-boundary,
  fail-safe adversarial, degenerate, Unicode/composition, injection-like
  strings, seeded property fuzz). Extended tests/test_length_guard.py
  (already in Allowed Paths) rather than creating a new file. Found ONE
  genuine false positive: an extreme-compression "long CJK phrase -> bare
  Latin acronym" translation (e.g. "ISO 9001" for a 21-char descriptive CJK
  source) IS flagged (ratio 0.109, well below k=0.3), even though it reads
  as a complete correct translation. Verified this is a structural property
  (translated_len must be roughly >= source CJK char count to escape the
  flag), not a one-off. Confirmed it lies outside the 233-pair calibration
  corpus's observed range (0% FP at k up to 0.5 implies every real pair had
  ratio >= 0.5), so not a proven production defect, but a real,
  previously-undocumented residual risk for bare-acronym/code-only cells.
  Tracked via xfail(strict=True) so the gate stays green and the finding
  cannot be silently lost; documented as a BLOCKING-severity finding in
  monkey-test-report.md with reproduction, mechanism, and containment
  analysis (keep-longest/never-source/bounded-1-attempt recovery bounds the
  worst-case damage). All other 25 scenarios passed: realistic legit-short
  (30-46% of E) not flagged; exact strict-< boundary correct; all 3
  fail-safes independently confirmed at their exact boundaries (source
  14-vs-15 chars, E==0 x4 variants, uncalibrated-target x6 variants); target
  key normalization (case/whitespace) does NOT go silently inert; degenerate
  inputs (empty/whitespace/None/single-char) behave correctly, including the
  true-positive empty-translation-of-long-source case; Unicode composition
  (full-width digits, CJK punctuation, combining marks, RTL Arabic, ZWJ,
  surrogate-pair emoji, BOM) never miscounts or crashes; SQL/script-like
  strings handled as plain text with no crash. Seeded fuzz (3 seeds
  recorded) confirms fail-safe/no-crash/mathematically-bounded-safe
  invariants across randomized content.
