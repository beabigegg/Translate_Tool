risks:
  - id: R-1
    description: >-
      When _fallback_individual breaks mid-batch (translation_helpers.py:371-372),
      unprocessed indices return (False, "[Missing translation result]") from
      BatchTranslator.get() (line 381). Block assembly (lines 477-485) only checks
      sent.startswith("[Translation failed"), which does NOT match
      "[Missing translation result]", so block-level all_ok stays True and done is
      counted optimistically on a mid-batch stop.
    mitigating-factor: >-
      Retry correctness is preserved: _FAILURE_PATTERNS in translation_verification.py
      includes "Missing translation result]", so is_failed_translation() returns True
      at value level and verify_and_fill_tmap detects/retries via the tmap KEY. Only
      block-level ok/done accounting on the stop path is optimistic.
    severity: low
    disposition: accepted
    follow-up: "Open tracked issue: block assembly at translation_helpers.py:481 should also treat '[Missing translation result]' as not-ok. Owner: backend-engineer + test-strategist."
fixback-routing:
  - "evidence-artifact (final-status: failed, missing collect phase) -> test-strategist / re-run cdd-kit test run"
  - "R-1 mid-batch missing-result accounting (data-shape) -> backend-engineer + test-strategist (follow-up only)"
dependency:
