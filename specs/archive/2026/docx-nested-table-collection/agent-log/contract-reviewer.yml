  Main Claude independently verified before writing, rather than trusting the
  proposal:
    - tests/test_docx_nested_tables.py does not exist (new file, as claimed).
    - MAX_TABLE_NESTING_DEPTH appears nowhere in source.
    - env-contract.md L86 forbids an env row for a non-os.environ config.py
      constant and requires a business-rules "not an env var" note. tasks.yml 4.3
      set to skipped on that basis.
    - table_serializer.serialize() sizes the grid from max(row)/max(col) and fills
      with empty strings, so the contract's claim that a rerouted cell "leaves an
      empty positional placeholder" in the legacy grid is true, not inferred.

  One correction applied to the reviewer's proposed prose: it described the
  pipe-grid as "retired". It is RETAINED and FROZEN (Resolution A of
  json-structured-translation-io) and reachable at flag-OFF; deleting it would make
  the kill switch a degradation. Reworded to "frozen legacy".

  Rule-count decision (two rules, not one) accepted: collection+depth and
  frame-reroute fail independently and carry separate acceptance criteria.
