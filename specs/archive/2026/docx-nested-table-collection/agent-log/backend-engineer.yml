falsifiability-verification:
  - probe: "seen_tc keyed by id(cell._tc) in _process_table"
    result: "did NOT reproduce false collisions up to 1000x5=5000 cells — masked because every emitted cell is retained via Segment.ref, which keeps its address alive for the rest of the walk (the same undocumented-invariant class design.md Q3 warns about)"
  - probe: "seen_tc_local keyed by id(cell._tc) in _flatten_nested_table_text (no Segment retention there)"
    result: "RED confirmed — 8/300 distinct texts survived (matches evidence/probe_id_recycling.py's measured 8-of-300); this is the genuinely reproducible location and is what tests/test_docx_nested_tables.py::TestNestingDepthGuard::test_flatten_at_depth_limit_survives_id_recycling_60x5 guards"
  - probe: "cell.tables recursion disabled in _process_table"
    result: "RED confirmed on AC-1 and both AC-2 tests"
  - probe: "BR-114 conjunction changed from AND to OR"
    result: "RED confirmed on both AC-4 false-positive guard tests"
  - probe: "MAX_TABLE_NESTING_DEPTH bound removed (recurse_nested = has_nested)"
    result: "RED confirmed on both AC-5 tests (terminated quickly, no hang; table-group count and warning-count assertions failed as expected)"
  - probe: "seen_tc dedup check disabled entirely (if False and ...) in _process_table"
    result: "RED confirmed on both AC-3 tests (8 and 52 segments respectively instead of 5 and 49)"
falsifiability-verification-note: >-
  All probes executed against a scratch snapshot
  (/tmp/.../scratchpad/docx_processor.py.orig) and restored via `cp` from
  that snapshot; git checkout/stash/restore was never used.
risks:
  - "AC-6's second test required output_mode='replace' to assert cell text directly (default 'append' inserts alongside original, complicating assertions); no production behavior change from this."
  - "Design.md's Q4 measured-hazard claim (id() recycling) does not reproduce in _process_table itself due to Segment.ref retention masking it — this is a real, favorable side effect of the current code shape, not a defect, but it means the module-level regression guard for BR-81's id() ban is only reliably falsifiable via the depth-limit flatten path (documented in the test's docstring and this log)."
