change-id: docx-nested-table-collection
agent: backend-engineer
status: pass
summary: >-
  Implemented BR-113 recursive nested-table collection, BR-114 layout-frame
  reroute, and the BR-81 amended element-identity merged-cell dedup in
  docx_processor.py's _collect_docx_segments walk. Replaced all id()-keyed
  collection (table_id counter, seen_par_keys, seen_tc) with element-identity
  or monotonic-counter keys per the AMENDED-AFTER-MEASUREMENT plan. Added
  MAX_TABLE_NESTING_DEPTH=3 hardcoded config constant with flatten-and-warn
  at the depth limit. Authored tests/test_docx_nested_tables.py (13 tests)
  covering AC-1..AC-6, plus one extra falsifiability test for the depth-limit
  flatten path's id()-recycling hazard (the true reproducible location for
  that hazard, since _process_table's own dedup is incidentally masked by
  Segment.ref retention). All required test-plan falsifiability checks were
  verified RED-then-GREEN by hand against scratch snapshots (never
  git checkout/stash). Full AC-7 regression set and full suite both green.
