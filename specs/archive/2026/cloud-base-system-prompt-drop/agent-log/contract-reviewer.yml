notes: >-
  Key reasoning: BR-109's clauses were never violated by this defect. The empty
  string was still merged ahead of BR-78 system_context, still delivered via the
  system channel, never leaked into the user payload. The input to BR-109's
  mechanism was wrong, not the mechanism. BR-109 had also been amended twice in
  two days (0.27.0 -> 0.27.1 -> 0.27.2); a fourth graft onto one overloaded rule
  would degrade what its single test-pointer column can mean. BR-110 states the
  durable invariant instead — constructor prompt-parameter parity across sibling
  LLM client classes — which prevents the NEXT provider client from repeating the
  bug regardless of whether it ever touches document-context summaries. Wording
  deliberately says conformance is verified at the outgoing request boundary and
  never on client.system_prompt, so it cannot tempt a future test author into the
  assignment-without-delivery tautology. Live schema-version re-read from the
  file by main Claude before bumping. Neither absence-tested token is present.
next-action: run-test-strategist
