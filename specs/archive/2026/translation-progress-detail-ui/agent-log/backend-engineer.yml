next-action: none — IP-1..IP-17 implemented (backend + frontend, per explicit session task); ready for qa-reviewer / gate evidence collection by main Claude
summary: >
  Implemented all 17 IP items. BR renumbered to BR-105 (eta-multi-phase-pipeline) —
  verified BR-98/99/100/101-104 already live (BR-98 = judge-retranslation-provider-consistency,
  pre-existing) before choosing 105, collision-free. Backend: JobStatus +8 optional fields
  (schemas.py); CurrentSegmentSnapshot dataclass + JobRecord.current_segment + critique/judge
  ETA bookkeeping fields (job_manager.py); widened status_callback (translation_service.py) to
  (message, segment=None) emitting translate/critique/qe/adopt stage snapshots inside the
  ROUND-BASED critique loop (batch-critique-qe-scoring's final shape) via an additive
  _batched_critique_adopt(on_scored=None) hook (no duplicate QE scoring); quality_judge.py
  run_judge_loop/_run_judge_loop_impl gained additive snapshot_cb=None (fail-soft try/except,
  fires at scoring + retranslating substeps); job_manager judge call site wires snapshot_cb +
  widens _translate_fn for the authoritative retranslating-substep write; routes.py
  _compute_multi_phase_eta() (pure, unit-testable) replaces the single-phase calc. Frontend:
  StageDetailPanel/StageBadge + JudgeTierBadge added inside TranslationProgress.jsx (no new
  component file); qualityTier migrated off hardcoded hex to CSS tokens; i18n stage/substep
  labels added to zh-TW.js/en.js; JUDGE_MAX_ITERATIONS_DISPLAY constant added (no new
  endpoint/field, per ADR-0010 — informational display fallback only). Contracts: api (33
  fields via cdd-kit contract schema set, incl. closing status_detail/layout_viz_available
  drift), css, design-tokens, business-rules (BR-105), data-shape all updated + versioned +
  CHANGELOGed; openapi.yml/json regenerated, export --check green. Fixed 2 pre-existing test
  regressions caused by the additive snapshot_cb/on_scored kwargs (test_orchestrator_judge.py's
  3 fake run_loop signatures, test_fewshot_glossary.py's _batched_critique_adopt lambda) and
  extended 2 shared MagicMock _make_job()-style helpers (test_jobstatus_download_url.py,
  test_pdf_render_warnings.py) that would otherwise return auto-mock objects for the new
  attributes and fail JobStatus pydantic validation.
