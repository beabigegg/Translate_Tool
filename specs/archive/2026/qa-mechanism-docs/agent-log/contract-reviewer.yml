drafted-text: |
  ## Edit 1 — new Decision Table in contracts/business/business-rules.md
  Insertion point: after Table X's last row, before "## Change Policy".

  ### Table Y — QA/quality-pipeline mechanism relationships (BR-55, BR-56, BR-72 through BR-77, BR-89, BR-90, BR-97 through BR-100)

  This table is a cross-reference index only — it does not restate behavior
  already specified in the referenced rules or in Table U; see those rules
  for full behavior and test detail.

  | mechanism | scope / when it runs | quality signal | triggers a new re-translation attempt? | rule references |
  |---|---|---|---|---|
  | (1) In-line critique loop | Per-segment, during the initial translation pass | CometKiwi relative comparison of draft vs. one already-generated revision (strictly-greater-than wins; a tie keeps the draft); falls back to a deterministic length/fluency heuristic when QE is unavailable | No — the revision is produced unconditionally as one deterministic extra step per segment; the score only decides which of the two already-produced candidates is kept, it does not request additional translation attempts. Batched per the batch-critique-qe-scoring change. | BR-89, BR-90 |
  | (2) Post-job bulk COMET rescore | Whole-job, once, after all files have been translated | CometKiwi absolute score per block, stored in JobQualityRecord | No — permanently dashboard-only/advisory. Surfaced only via GET /api/jobs/{id}/quality. BR-92 (qe-rescore-threshold), which formerly proposed a rescore-below-threshold to re-translate bridge, has been retired; no such bridge exists or is planned. | BR-55, BR-56 |
  | (3) LLM-as-judge | Per-block, after translation completes, before the user confirms/applies the judged output | Absolute 高/中/低 verdict from a separate judge LLM call | Yes — the ONLY mechanism whose quality verdict conditions a new re-translation call. Re-translates on 中 or 低, up to JUDGE_MAX_ITERATIONS. The re-translation call is routed through the judge's own provider, decoupled from whichever provider won main translation (BR-98); the loop is cooperatively cancellable and wall-clock-bounded (BR-99, BR-100). | BR-72 through BR-77, BR-97, BR-98, BR-99, BR-100 |

  | condition | behavior | test id |
  |---|---|---|
  | Mechanism (1) already adopted a critique-revised draft for a segment; mechanism (3) later judges that same block and returns 中 or 低 | Mechanism (3) re-translates the block via its own judge-feedback loop, discarding the text mechanism (1) adopted. The two mechanisms hold no shared state and do not reconcile or defer to each other's prior decision on a given segment. This is current, intentional, independently-evolved behavior — not a bug — and remains unchanged by br92-rescore-resolution, qa-judge-provider-consistency, and qa-judge-hang-recovery, each of which was scoped to a single mechanism. | tests/test_critique_gate.py, tests/test_quality_judge.py |
  | Mechanism (2)'s post-job score is low for a segment that mechanism (1) or (3) already acted on | No action is taken. Mechanism (2) never reads mechanism (1)/(3) state, never writes to the translation pipeline, and never triggers re-translation (BR-55, BR-56; BR-92 retired). | tests/test_quality_evaluation.py |

  ## Edit 2 — contracts/api/api-contract.md, JobStatus.quality_score_avg notes cell (line 154)
  Current: "average COMET/xCOMET quality score across all blocks; null when QE disabled or job not complete; see BR-54"
  New: "average COMET/xCOMET quality score across all blocks; null when QE disabled or job not complete; advisory/non-gating — this value is the mechanism-(2) post-job dashboard score, informational only, and never triggers re-translation or any other pipeline action regardless of how low it is (BR-55, BR-56; see business-rules.md Table Y for how this relates to the in-line critique loop and the LLM-judge mechanisms); see BR-54"

  ## Edit 3 — contracts/data/data-shape-contract.md, new paragraph before "### BlockQualityScore — data shape"
  "**Advisory / non-gating.** This record captures mechanism (2) of the QA pipeline — a whole-job, post-translation COMET rescore. It is informational/dashboard-only and never triggers re-translation or any other pipeline action, regardless of score. It is produced and consumed independently of the in-line critique-loop CometKiwi comparison (BR-89, BR-90) and the LLM-judge verdict (BR-72 through BR-77, BR-97 through BR-100) — see business-rules.md Table Y for how the three QA mechanisms relate. BR-92, which formerly proposed a rescore-below-threshold to re-translate bridge from this record, has been retired; no such bridge exists or is planned."

  ## CHANGELOG.md entries
  "## [business 0.23.1] — 2026-07-07
  Added: Table Y (QA/quality-pipeline mechanism relationships) — cross-reference table documenting how the in-line critique loop (BR-89, BR-90), post-job bulk COMET rescore (BR-55, BR-56, permanently dashboard-only post BR-92 retirement), and LLM-as-judge (BR-72 through BR-77, BR-97 through BR-100) relate; records that mechanisms (1) and (3) share no state and can disagree by design. No new rule ids; no behavior change. Added in change qa-mechanism-docs.

  ## [api 0.10.1] — 2026-07-07
  Updated: JobStatus.quality_score_avg note — added advisory/non-gating clarification (informational dashboard value; never triggers re-translation). No schema/type/nullability change. Added in change qa-mechanism-docs.

  ## [data 0.15.1] — 2026-07-07
  Updated: Quality Evaluation (QE) Score Representation intro — added advisory/non-gating clarification for JobQualityRecord (dashboard-only; never triggers re-translation; cross-reference to business-rules.md Table Y; notes BR-92 retirement). No schema change. Added in change qa-mechanism-docs."
