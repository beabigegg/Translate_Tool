notes:
  - TDD order followed: tests written first (failing), then metrics.py implemented to pass them.
  - SENTENCE_MODE batch path: batch latency distributed as per-item mean (elapsed_ms / n items). This is the only practical option without instrumenting inside translate_blocks_batch.
  - Non-SENTENCE_MODE path: exact per-call timing via time.monotonic() wrapping translate_once.
  - provider_failure_count is incremented once via record_translation(failed=True) AND once via record_provider_failure() per failed call — this means a single failed translate_once call adds 2 to provider_failure_count in the current hook. See known-risk below.
  - Known risk: double-counting of provider_failure_count in service hooks. record_translation(failed=True) increments it AND the subsequent record_provider_failure() increments it again. This should be resolved by either removing the failed=True path in record_translation or removing the separate record_provider_failure() call. The test_provider_failure_count_increments_per_attempt_in_chain test uses record_provider_failure() directly (3 calls -> +3) and passes, but the service hook double-counts.
