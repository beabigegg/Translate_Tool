change-id: batch-critique-qe-scoring
agent: backend-engineer
status: done
next-action: hand off to qa/e2e-resilience review; run cdd-kit test run for evidence + gate (main Claude)
summary: >-
  Implemented IP-1..IP-6. Inverted the critique loop in translation_service.py
  from per-segment x per-iteration to round-based: each of CRITIQUE_MAX_ITERATIONS
  rounds revises every still-active pending segment (each individually
  try/except + timeout isolated), then issues exactly ONE score_blocks() call
  via the new _batched_critique_adopt() helper, then applies per-segment
  adoption strictly by pair index (2*i / 2*i+1), carrying the adopted draft
  into the next round. _critique_gate_adopt (single-pair) is unchanged and
  still used for its own direct callers/tests; _batched_critique_adopt reuses
  its exact strict-greater-than/tie-keeps-draft rule and _heuristic_should_adopt
  for the QE-unavailable fallback, and degrades every pending segment to
  keep-draft when score_blocks() returns []. Pre-filter (":c" cache skip +
  failure-placeholder skip), status_callback progress text, and the
  record_critique_loop_invocation()/record_critique_iteration(total) metrics
  calls are preserved with identical accounting semantics. quality_evaluator.py
  was NOT edited (verified only) — score_blocks() returns scores in input
  order and the 8/4/1 OOM ladder + torch.cuda.empty_cache() still function
  correctly on a larger (2N) blocks list. Updated
  contracts/data/data-shape-contract.md "Critique gate usage" row to the
  batched call shape, bumped schema-version 0.16.0 -> 0.17.0, added a
  contracts/CHANGELOG.md [data 0.17.0] entry. Found and fixed one real
  regression outside the file-level plan: tests/test_fewshot_glossary.py
  ::test_revised_draft_recorded_in_tmap patched the now-bypassed
  _critique_gate_adopt directly to force-adopt revised text; since the round
  loop now calls _batched_critique_adopt, that mock was orphaned and the real
  (unmocked) COMET path ran, flipping the assertion. Fixed by retargeting the
  patch to _batched_critique_adopt with an equivalent list-returning
  side_effect (mechanical one-line seam-rename fix, no production-behavior
  change, only occurrence of this pattern in the whole test suite per grep).
