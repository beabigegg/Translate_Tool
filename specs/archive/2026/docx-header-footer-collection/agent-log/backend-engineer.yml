summary: >-
  Implemented BR-115 native DOCX header/footer paragraph+table collection.
  Added module-level _p_text_no_txbx (txbxContent-stripped variant of
  _p_text_with_breaks), threaded an optional text_extractor param through
  _add_paragraph/_cell_direct_text/_flatten_nested_table_text/_process_table/
  _process_container_content, and appended a six-slot per-section
  <w:hdr>/<w:ftr> collection block AFTER the body walk, deduped by element
  identity (seen_parts holds elements, never id()). Body call at L~427 and
  the COM call site (include_headers=True) are byte-for-byte unchanged.
  Wrote tests/test_docx_header_footer.py (14 tests) covering AC-1..AC-7.
  Verified 3 required falsifiability hazards by snapshot-sabotage-restore:
  txbx-strip revert, dedup-guard removal, and pre-body-walk reordering all
  produced the expected RED before restore.
