summary: >
  Implemented IP-1 through IP-11 per implementation-plan.md: config flag,
  shared json_translation.py builder/validator, table_serializer.py
  serialize_json/parse_json (frozen legacy serialize/parse retained), the
  translate_json seam on both clients (frozen _build_table_translate_prompt
  retained), the flag-branch wiring at all five table call sites plus the
  body path in translate_merged_paragraphs, IP-9 INFO fallback logging, and
  IP-10 test-double updates. Coordinator review round (post-first-pass)
  found two real gaps, both fixed and falsifiability-checked in this same
  pass — see "coordinator-review-remediation" below. Full test suite green
  (1337 passed, 4 skipped, 0 failed); cdd-kit validate --contracts exit 0.

coordinator-review-remediation:
  - finding: >
      Assignment-without-delivery gap on the translate_json seam: no test
      asserted, at the real transport boundary, that translate_json actually
      DELIVERS the system_prompt+system_context merge (only that fakes
      accept the kwarg). Coordinator proved this by deleting the merge from
      both clients' translate_json and observing the full 1326-test suite
      stay green.
    fix: >
      Added delivery tests at the real transport boundary on BOTH clients:
      tests/test_openai_compatible_client.py::TestTranslateJsonSystemChannelDelivery
      (mocks requests.Session.post, asserts kwargs["json"]["messages"] holds
      exactly one system message containing both a system_prompt token and a
      system_context token with system_prompt's index < system_context's
      index — ordering, not mere presence; plus a JSON-envelope-not-rewrapped
      assertion and a system-prompt-alone case) and
      tests/test_ollama_client_dynamic_strategy.py (3 new module-level
      test_translate_json_* functions asserting the same at the
      _call_ollama-captured payload dict — Ollama's merge was verified
      independently, symmetry was not assumed).
    falsifiability-check: >
      Deleted the merge from OpenAICompatibleClient.translate_json (replaced
      with a bare `return self._post_completion(user_payload,
      cancel_event=cancel_event)`) — the 2 new order/delivery tests went RED
      (the "no system at all" test correctly stayed green), confirming they
      test delivery, not signature. Restored via backup diff, re-ran green.
      Repeated identically for OllamaClient.translate_json (deleted the
      merged_system build + payload["system"] assignment) — same RED/GREEN
      result. Both files verified via `git status --short` to be byte-for-byte
      restored (no diff beyond the new translate_json method added earlier
      in this change) before finalizing.
  - finding: >
      `_META_REFUSAL_PATTERNS` gained an unanchored "need more context"
      entry — a real regression. Chinese "需要更多上下文" translates
      verbatim to "Need more context.", which the unanchored substring
      matched and discarded in favor of the (wrong-language) source,
      violating BR-108's own precision requirement. Coordinator demonstrated
      3 false-positive cases by direct execution.
    fix: >
      Narrowed the pattern to "more context to translate" (anchored on the
      self-referential act of translating, matching the sibling entries'
      pattern) in app/backend/utils/text_utils.py. Still catches BR-108's own
      quoted example ("I need more context to translate this") since it
      contains the anchored substring; no longer matches "Need more
      context." or "The reviewer will need more context.".
    tests-pinned: >
      tests/test_nontranslatable_segment_guard.py: positive
      (test_br108_json_example_is_detected, direct is_meta_refusal unit +
      test_meta_refusal_inside_schema_valid_json_still_caught, end-to-end
      via translate_merged_paragraphs) and negative
      (test_need_more_context_short_form_is_not_a_refusal,
      test_need_more_context_in_ordinary_sentence_is_not_a_refusal, both as
      direct is_meta_refusal unit tests AND as
      TestRefusalDetectorNegative::test_genuine_translation_need_more_context_*
      end-to-end cases through translate_merged_paragraphs) — both directions
      pinned per the coordinator's explicit requirement that the negative
      case is the one that matters.
  - note: >
      Re: whether BR-78 system_context routing coverage "moved" off the
      JSON path when _FakeEchoClient was pinned flag-OFF in
      test_context_prefix_bleed.py — YES, explicitly: the new
      TestTranslateJsonSystemChannelDelivery /
      test_translate_json_merges_system_prompt_ahead_of_system_context tests
      added in this remediation round now cover system_context delivery
      (ordering ahead of system_prompt is BR-109/BR-110; system_context
      itself is BR-78) on the JSON seam directly, at the transport boundary,
      independent of test_context_prefix_bleed.py's fixture.

