# --- Amendment (post-planning, pre-implementation): fold judge phase in ---
amendment:
  trigger: "Live 30+ min hang inside judge phase (quality_judge.run_judge_loop, JUDGE_ENABLED=true); original design scoped judge OUT of current_stage snapshot + BR-98 ETA, so it would not have helped diagnose the incident."
  changes:
    - "current_stage enum gains `judge`; added a decision clarifying 3 distinct mechanisms — qe-score (inline per-segment COMET critique gate), post-job bulk COMET rescore (dashboard-only, NOT a stage), and judge (LLM-as-judge gate) — do not conflate."
    - "3 new additive OPTIONAL fields: current_segment_judge_tier (enum 高/中/低|null, a DISTINCT field not a numeric|string union on current_segment_qe_score), current_segment_judge_attempt (1-based vs JUDGE_MAX_ITERATIONS), current_segment_judge_substep (scoring|retranslating|null). Judge reuses current_segment_source/draft."
    - "BR-98 gains phase-3 (judge) ETA term: observed per-block judge rate once started, else coarse N_judge_blocks × JUDGE_MAX_ITERATIONS × translate-cost; omitted (=0) when JUDGE_ENABLED=false OR winning provider is deepseek (BR-97). Total = phase1+phase2+phase3."
    - "run_judge_loop gets an additive OPTIONAL snapshot callback (default None) so the per-block scoring sub-step (the incident's stuck evaluate() call) is observable."
    - "ADR-0010 gained an Amendment section reaffirming poll-piggyback/single-snapshot for phase-3 and recording that the cancellation/total-timeout fix is a SEPARATE change (qa-pipeline-consolidation) — this change makes the hang observable, not fixed."
  out-of-scope: "Judge cancellation check + cloud client total-timeout guard — tracked in qa-pipeline-consolidation, explicitly not touched here."
