fix-notes: |
  - test_embed_zero_similarity_all_terms: initial fake_embed function had
    signature clash with patched class method (Python passes self as first arg).
    Fixed by using MagicMock(side_effect=...) with positional arg inspection.
  - test_phase0_hook_*: run_phase0_multi is a lazy import inside process_files
    (not a module-level import in orchestrator.py) so
    'app.backend.processors.orchestrator.run_phase0_multi' does not exist at
    patch time.  Fixed by patching at
    'app.backend.services.term_extractor.run_phase0_multi' (definition module),
    which the lazy import picks up fresh on each process_files call.
