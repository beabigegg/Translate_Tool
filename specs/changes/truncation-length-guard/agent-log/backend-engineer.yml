change-id: truncation-length-guard
status: complete
summary: >
  Implemented a pure composition-aware truncation length guard
  (app/backend/utils/length_guard.py) and wired it into the DOCX table-cell
  acceptance seam (docx_processor.py L1054-1058, per implementation-plan.md's
  verified seam), covering both the whole-table JSON path and the legacy
  pipe-grid path. Confirmed the live target string is the full name
  "Vietnamese" (grep-verified in ollama_client.py:36 and config.py:327) and
  seeded config.TRUNCATION_GUARD_COEFFICIENTS with normalized key
  "vietnamese". Verified via snapshot-sabotage (scratch backup + in-place
  edit + sha256 restore-check, never git checkout/stash/restore) that the
  three load-bearing lines are genuinely falsifiable: reversing the
  `< k*E` comparison turns test_flags_recorded_bug_ratio RED; removing the
  MIN_SOURCE_CHARS fail-safe early-return turns test_failsafe_short_source_
  below_min_chars RED; changing keep-longest to keep-source turns
  test_cell_seam_flags_and_recovers_truncated_reply RED. (Note: removing the
  "target not in coefficient table" fail-safe alone does NOT turn its test
  RED, because expected_length()'s own membership check independently
  returns 0.0 for an unlisted target, which the E==0 fail-safe then backstops
  — this is the intentional defense-in-depth BR-117 describes as "the
  backstop for any slip", not a gap.)
