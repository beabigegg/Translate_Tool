  - { id: "1.3", section: Preparation, title: "Confirm design decisions if required", status: done, note: "spec-architect (design.md + ADR-0012): (1) reuse fit_text_cascade/_wrap_lines_simple on ReportLab path too, amend BR-40 to make cascade the single shared authority for all PDF paths (draw primitives differ, wrap/sizing output doesn't); (2) table-detection: lines_strict -> lines -> text, additive-only when strict finds nothing, gated by >=2 rows/cols + min cell extent sanity check, never overrides successful strict detection; (3) 1:1 block-to-cell bbox: yes, extend x1/y1 to cell rect minus 2pt pad (right/bottom-only, preserve tight origin+per-line bbox for BR-84 whitening) -- CORRECTION (see below): this Decision 3 fix, already planned, is what fixes overlay-mode truncation too; it is the PRIMARY fix, more common than the find_tables() strategy fallback. Flagged risk: ReportLab path must be plumbed to carry StyleInfo + element ref for BR-38 render_truncated marker (currently dropped)." }
  - { id: "1.31", section: Preparation, title: "Post-design correction: overlay-mode truncation evidence", status: done, note: "User showed a 2nd screenshot: OVERLAY mode also loses content (truncated with literal '...'), contradicting the original 'overlay already correct, zero changes needed' framing. Follow-up Explore investigation confirmed: fit_text_cascade itself is sound (verified line-by-line); the actual defect is that pdf_parser.py's bbox-extension logic (_split_elements_by_cells:560-574) only runs on the multi-cell-merge branch -- the FAR MORE COMMON one-block-per-cell case (pdf_parser.py:444-452) never gets bbox correction in either axis, regardless of find_tables() success. This is exactly Decision 3 (already planned) -- no design rework needed, just corrected characterization in change-request.md/design.md. NEW finding: render_truncated (BR-38 marker) has ZERO production consumers (test-only) -- truncation is completely invisible to users today." }
  - { id: "1.32", section: Preparation, title: "Scope amendment: industry-practice research + bounded row-growth", status: done, note: "User asked for industry-practice research before deciding whether to add flowing-layout fallback. WebSearch findings: DTP industry standard fix order is frame/box-growth BEFORE font-shrink (opposite of our cascade); commercial PDF translators market cells that auto-grow to fit translated text; 20-35% text expansion is normal, not edge-case. User decision: full page/cross-table reflow is OUT of scope (too large, future change); but IN scope now: (1) fix the confirmed available_whitespace_below=0.0 hardcoded bug, (2) bounded row-height growth pushing ONLY sibling rows in the SAME table, (3) job.warnings entry (BR-96 precedent). New AC-9/10/11 added to change-classification.md." }
  - { id: "1.33", section: Preparation, title: "Design amendment for AC-9/10/11", status: done, note: "spec-architect (design.md Decisions 4/5/6 + new ADR-0013): (4) available_whitespace_below computed ONCE in bbox_reflow.py (shared authority), carried as new Placement field, fitz reads it instead of hardcoded 0.0; (5) row-growth is a TRUE two-pass pre-pass in pdf_processor.py's _dispatch_render (NOT a parser-time heuristic), measures per-row required height via fit_text_cascade, shifts lower rows' bbox + metadata[lines] in the IR upstream of BOTH renderers, capped at the table's local page-remaining-space budget, falls through to truncation+warning if insufficient; (6) truncation warning is a post-render sweep in _dispatch_render reusing the exact BR-96 warnings_callback plumbing (renderer sets render_truncated in-place, processor sweeps + reports, no new callback threaded into renderer). New ADR-0013 (row-growth pre-pass is architecturally significant on its own -- new document-geometry-mutation stage between translation and rendering). Risks flagged: HIGH -- overlay mode's pushed-down text can land over original PDF background's horizontal rules since the background image itself isn't moved (recommend a config flag to disable row-growth without full revert); MEDIUM -- metadata[lines] whitening bboxes must shift with pushed rows." }
