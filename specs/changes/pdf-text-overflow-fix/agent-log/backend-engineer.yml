deviations:
  - "IP-4 (coordinate_renderer.py) was specced 'verify-only, add none', but AC-3's test-plan node explicitly targets CoordinateRenderer._render_side_by_side (tests/test_coordinate_renderer.py::TestCoordinateRendererEdgeCases::test_side_by_side_unfittable_text_sets_render_truncated), and that method builds its translation TextRegion manually (not via create_text_regions_from_elements/create_text_regions_from_placements, which is where IP-1 was scoped). Without threading style/element into that manual construction too, render_truncated could never be set on this sub-path, permanently red-lining the test-plan's own AC-3 case. Added `style=element.style, element=element` to that one TextRegion(...) call (coordinate_renderer.py:265-277) — no new cascade logic, just wiring an already-available reference, matching IP-1's stated intent verbatim ('thread element ref... so the cascade gets a faithful starting font AND a truncation-marker target')."
  - "implementation-plan.md's File-Level Plan table omits tests/test_coordinate_renderer.py entirely, yet test-plan.md (FINALIZED) maps 3 AC-1/AC-2/AC-3 test nodes to that exact file, and it IS listed in context-manifest.md's Allowed Paths/Required Tests. Treated as a plan omission covered by the finalized test-plan.md + manifest, not a scope expansion — extended that file per test-plan.md's node names."
  - "AC-9's Placement.available_whitespace_below required extending fitz_renderer._insert_text_in_rect's SIGNATURE (new keyword param, default 0.0, backward-compatible) and its one call-site's tuple, beyond the literal single line ~511 value swap called out in the plan — there is no other way to get the real per-Placement gap into that method. The line ~511 change itself is exactly one line (0.0 -> the parameter); the added parameter is pure plumbing to make that line meaningful, not new cascade logic, and _insert_text_in_rect's internal cascade-decision/render logic is otherwise byte-for-byte unchanged."
  - "Strengthened the BR-101 sanity gate beyond the plan's literal '>2.0pt floor' spec with an additional MIN_READABLE_FONT_PT (8pt) per-cell-height requirement, because the plan's floor alone let strategy=\"text\" hallucinate a table over tests/fixtures/test_multiline.pdf's real wrapped paragraph (row heights down to 5.72pt), regressing an AC-6 must-not-regress test. This satisfies the plan's own AC-7 'never worsens' requirement, which the literal floor alone violated on this fixture."
