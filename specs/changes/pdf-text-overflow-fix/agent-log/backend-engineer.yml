change-id: pdf-text-overflow-fix
agent: backend-engineer
status: done
next-action: main Claude runs cdd-kit test run for evidence generation and gate
summary: >
  Implemented IP-1..IP-15 per implementation-plan.md. Renumbered this change's
  four new business rules to BR-101 (table-detection-strategy-fallback),
  BR-102 (table-cell-bbox-extent-correction), BR-103 (bounded-local-table-row-growth),
  BR-104 (pdf-render-truncation-disclosure) — live business-rules.md highest
  was BR-100 (qa-judge-hang-recovery) at edit time, confirmed collision-free
  via grep before and after. BR-40 amended (single shared fit_text_cascade
  authority across all PDF paths, ADR-0012) and BR-36 clarifying sentence
  appended (available_whitespace_below revives dead cascade step d) —
  no renumber needed for those (amendments to existing rules). Single version
  bump each: business-rules.md 0.23.0->0.24.0, data-shape-contract.md
  0.15.0->0.16.0, env-contract.md 0.14.0->0.15.0 (PDF_TABLE_ROW_GROWTH_ENABLED,
  CER-003-approved scope expansion, also added to .env.example.template and
  env.schema.json per Deployment Sync Policy). One pre-existing false-positive
  regression was caught and fixed during implementation: the BR-101 sanity
  gate's original ">2.0pt" floor alone accepted a strategy="text" whitespace
  hallucination over tests/fixtures/test_multiline.pdf's wrapped paragraph
  (row heights as low as 5.72pt); added a MIN_READABLE_FONT_PT (8pt) per-cell
  row-height floor to the gate, restoring
  TestParagraphAggregation::test_paragraph_aggregation_reduces_element_count
  to green (confirmed via git-stash bisection that this was a regression I
  introduced, not pre-existing).
