# Contract-driven gates
# Tier semantics: ci/gate-policy.md
# Active change gates: none (archived: p1-cloud-providers, p1-provider-routing, p1-font-lru-cache, p2-ir-document-model, p2-layout-detection)

name: contract-driven-gates

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '0 18 * * 1'

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

jobs:
  contract-and-fast-tests:
    name: contract-and-fast-tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: pip

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Python dependencies
        run: pip install -r app/backend/requirements.txt

      - name: Install cdd-kit
        run: npm install -g contract-driven-delivery

      - name: Validate contracts (Tier 1 — blocks merge)
        run: cdd-kit validate --contracts

      - name: Change gate (Tier 1 — blocks merge)
        run: |
          echo "No active change gates — all current changes are in specs/archive/."

      - name: OpenAPI sync gate
        run: cdd-kit openapi export --check --out contracts/api/openapi.yml

      - name: Secret scan — no literal API keys in source (Tier 1 — blocks merge)
        run: |
          ! grep -rn \
            --include="*.py" --include="*.yml" --include="*.yaml" \
            -E "(PANJIT_API|DEEPSEEK_API)\s*[:=]\s*[A-Za-z0-9+/]{20,}" \
            . --exclude-dir=.git

      - name: Unit, contract, integration, resilience, data-boundary tests (Tier 1 — blocks merge)
        run: pytest tests/ -x -q --tb=short --junitxml=test-results/junit.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/junit.xml
          retention-days: 14

  full-regression:
    name: full-regression
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: pip

      - name: Install Python dependencies
        run: pip install -r app/backend/requirements.txt

      - name: Full regression suite (Tier 2 — informational; new failures escalate to blocker)
        run: pytest tests/ -q --tb=short --junitxml=test-results/full-regression.xml

      - name: Env template check (Tier 2 — informational)
        run: grep -l "PANJIT_API\|DEEPSEEK_API" contracts/env/.env.example.template

      - name: Upload full regression results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: full-regression-results
          path: test-results/full-regression.xml
          retention-days: 14

  golden-sample-regression:
    name: golden-sample-regression
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: pip

      - name: Install Python dependencies
        run: pip install -r app/backend/requirements.txt

      - name: Golden-sample regression (Tier 2 — blocks merge on PR)
        # All fixture files are pre-committed binaries in tests/fixtures/golden/.
        # No network access or GPU is required. A reading_order-only diff is not
        # a regression; any pre-existing-field diff fails the gate.
        # DOCX/PPTX fixtures deferred — tests skip gracefully until fixtures are committed.
        run: pytest tests/test_golden_regression.py --tb=short -q

  layout-detector-dependency-gate:
    name: layout-detector-dependency-gate
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Layout detector dependency gate (Tier 2 — blocks merge)
        # AC-8: only onnxruntime (CPU, no suffix) is permitted.
        # ultralytics is forbidden (license). onnxruntime-gpu is forbidden
        # in base requirements (operator opt-in only, installed out-of-band).
        # Pass condition: grep finds no match → exit 1 from grep → ! inverts to exit 0.
        run: |
          ! grep -E "(ultralytics|onnxruntime-gpu)" \
            app/backend/requirements.txt \
            app/backend/environment.yml

  renderer-equivalence:
    name: renderer-equivalence
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: pip

      - name: Install Python dependencies
        run: pip install -r app/backend/requirements.txt

      - name: Renderer equivalence gate (Tier 2 — blocks merge on PR)
        # AC-4/AC-5: both render paths (fitz primary, ReportLab fallback) make identical
        # element-level decisions (inclusion, reading-order bucket, text-source) for the
        # same TranslatableDocument IR. See contracts/ci/ci-gate-contract.md §Renderer Equivalence Gate.
        # The -k "equivalence" filter selects TestLayoutEquivalence, TestEquivalenceGolden,
        # TestReadingOrderPreservedBothPaths, and TestElementTypingPreservedBothPaths across
        # test_ir_pipeline_decoupling.py now; when test_renderer_convergence.py is committed
        # by the backend-engineer, the filter extends to it automatically.
        run: >
          pytest tests/test_ir_pipeline_decoupling.py
          -k "equivalence"
          --tb=short -q
          --junitxml=test-results/renderer-equivalence.xml

      - name: Upload renderer-equivalence results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: renderer-equivalence-results
          path: test-results/renderer-equivalence.xml
          retention-days: 14

  scheduled-stress-soak:
    name: scheduled-stress-soak
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Stress and soak tests (Tier 4 — weekly; not applicable to p1-cloud-providers)
        run: |
          # Stress/soak deferred to p1-observability-metrics per change-classification.md §Tasks Not Applicable 3.5
          echo "No stress/soak targets configured for this change — skipping."
