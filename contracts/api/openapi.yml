            "type": "string"
          },
          "domain": {
            "type": "string"
          },
          "target_text": {
            "type": "string"
          },
          "confidence": {
            "type": "number"
          }
        },
        "required": [
          "source_text",
          "target_lang",
          "domain",
          "target_text"
        ]
      },
      "WikidataSearchRequest": {
        "type": "object",
        "properties": {
          "term": {
            "type": "string"
          },
          "source_lang": {
            "type": "string",
            "description": "default Chinese"
          },
          "target_langs": {
            "type": "array",
            "items": {
              "type": "string"
            },
            "description": "default English"
          },
          "domain": {
            "type": "string",
            "description": "default general"
          }
        },
        "required": [
          "term"
        ]
      },
      "WikidataCandidate": {
        "type": "object",
        "properties": {
          "entity_id": {
            "type": "string"
          },
          "source_label": {
            "type": "string"
          },
          "description": {
            "type": "string"
          },
          "labels": {
            "type": "string",
            "description": "serialized as JSON map of lang -> label"
          }
        },
        "required": [
          "entity_id",
          "source_label",
          "description",
          "labels"
        ]
      },
      "WikidataSearchResponse": {
        "type": "object",
        "properties": {
          "term": {
            "type": "string"
          },
          "candidates": {
            "type": "array",
            "items": {
              "$ref": "#/components/schemas/WikidataCandidate"
            }
          }
        },
        "required": [
          "term",
          "candidates"
        ]
      },
      "WikidataImportRequest": {
        "type": "object",
        "properties": {
          "source_text": {
            "type": "string"
          },
          "target_text": {
            "type": "string"
          },
          "source_lang": {
            "type": "string"
          },
          "target_lang": {
            "type": "string"
          },
          "domain": {
            "type": "string",
            "description": "default general"
          },
          "entity_id": {
            "type": "string"
          }
        },
        "required": [
          "source_text",
          "target_text",
          "source_lang",
          "target_lang"
        ]
      },
      "MetricsResponse": {
        "type": "object",
        "properties": {
          "translation_count": {
            "type": "integer",
            "description": "total translation calls since process start; initializes to 0"
          },
          "translation_latency_mean_ms": {
            "type": "number",
            "description": "running arithmetic mean of per-call latency in ms; 0.0 when translation_count is 0; always serialized as float"
          },
          "provider_failure_count": {
            "type": "integer",
            "description": "total provider call failures since process start; initializes to 0; see BR-23"
          },
          "font_cache_hits": {
            "type": "integer",
            "description": "total font buffer cache hits since process start; initializes to 0"
          },
          "font_cache_misses": {
            "type": "integer",
            "description": "total font buffer cache misses since process start; initializes to 0"
          },
          "critique_loop_invocations": {
            "type": "integer",
            "description": "total critique-loop invocations since process start; initializes to 0; see BR-46"
          },
          "critique_iterations_total": {
            "type": "integer",
            "description": "cumulative critique iterations across all requests since process start; initializes to 0; see BR-46"
          },
          "glossary_match_rate": {
            "type": "number",
            "description": "glossary term match rate (0.0–1.0 float); definition per design.md; 0.0 when no terms evaluated; see BR-46"
          }
        },
        "required": [
          "translation_count",
          "translation_latency_mean_ms",
          "provider_failure_count",
          "font_cache_hits",
          "font_cache_misses"
        ]
      },
      "BlockQualityScore": {
        "type": "object",
        "properties": {
          "block_id": {
            "type": "string",
            "description": "element_id of the TranslatableElement this score belongs to"
          },
          "score": {
            "type": "number",
            "description": "COMET/xCOMET quality score; float; range is model-dependent (see BR-54)"
          },
          "model": {
            "type": "string",
            "description": "name/version of the QE model that produced the score (e.g. Unbabel/wmt22-cometkiwi-da)"
          }
        },
        "required": [
          "block_id",
          "score",
          "model"
        ]
      },
      "JobQualityResponse": {
        "type": "object",
        "properties": {
          "job_id": {
            "type": "string",
            "description": "job identifier"
          },
          "status": {
            "type": "string",
            "enum": [
              "available",
              "pending",
              "disabled",
              "unavailable"
            ],
            "description": "available — scores ready; pending — translation not yet complete or scoring still running; disabled — QE_ENABLED=false; unavailable — model load failed or scoring failed for this job"
          },
          "scores": {
            "type": "array",
            "items": {
              "$ref": "#/components/schemas/BlockQualityScore"
            },
            "description": "present and non-empty when status = available; omitted or empty array when status is any other value"
          }
        },
        "required": [
          "job_id",
          "status"
        ]
      },
      "ProviderHealthItem": {
        "type": "object",
        "properties": {
          "provider": {
            "type": "string"
          },
          "status": {
            "type": "string"
          },
          "latency_ms": {
            "type": "number"
          }
        },
        "required": [
          "provider",
          "status"
        ]
      },
      "TestTranslationRequest": {
        "type": "object",
        "properties": {
          "text": {
            "type": "string"
          },
          "src_lang": {
            "type": "string"
          },
          "targets": {
            "type": "array",
            "items": {
              "type": "string"
            }
          },
          "profile": {
            "type": "string"
          },
          "models": {
            "type": "array",
            "items": {
              "type": "string"
            }
          },
          "deepseek_api_key": {
            "type": "string"
          }
        },
        "required": [
          "text",
          "src_lang",
          "targets"
        ]
      },
      "TestTranslationResult": {
        "type": "object",
        "properties": {
          "model_id": {
            "type": "string"
          },
          "provider": {
            "type": "string"
          },
          "translation": {
            "type": "string"
          },
          "duration_ms": {
            "type": "number"
          },
          "comet_score": {
            "type": "number"
          },
          "error": {
            "type": "string"
          }
        },
        "required": [
          "model_id",
          "provider",
          "duration_ms"
        ]
      },
      "ProviderModelEntry": {
        "type": "object",
        "properties": {
          "provider": {
            "type": "string"
          },
          "translate_model": {
            "type": "string"
          },
          "long_doc_model": {
            "type": "string"
          }
        },
        "required": [
          "provider"
        ]
      },
      "JobCreateRequest": {
        "type": "object",
        "properties": {
          "file": {
            "type": "string",
            "description": "one or more document files (DOCX, PPTX, XLSX, PDF); multipart upload",
            "format": "binary"
          },
          "target_language": {
            "type": "string",
            "description": "comma-separated target language codes; ≥1 non-empty value required (BR-3)"
          },
          "source_language": {
            "type": "string",
            "description": "source language code; auto-detected when omitted"
          },
          "model": {
            "type": "string",
            "description": "model override; defaults to provider routing config (BR-4)"
          },
          "profile": {
            "type": "string",
            "description": "profile id; overrides routing group"
          },
          "num_ctx": {
            "type": "integer",
            "description": "context window override; must satisfy BR-2"
          },
          "output_mode": {
            "type": "string",
            "enum": [
              "append",
              "replace"
            ],
            "description": "output mode for DOCX/PPTX translation; default append; replace overwrites source paragraphs/text-frames in-place; ignored (clamped to append) when len(targets) > 1 (BR-66, BR-67); invalid values rejected with HTTP 422"
          }
        },
        "required": [
          "file",
          "target_language"
        ]
      }
    }
  }
}
